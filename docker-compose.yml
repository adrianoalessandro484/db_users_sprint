services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-db-users-postgres
    environment:
      POSTGRES_USER: adriano
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_users
    ports:
      - "5434:5432"
    volumes:
      - db_users_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adriano -d db_users"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-ms-users
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
    env_file:
      - .env
    networks:
      - erp-network
    restart: unless-stopped

volumes:
  db_users_data:

networks:
  erp-network:
    external: true